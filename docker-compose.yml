services:
  backend:
    build:
      context: ./backend
    container_name: drone-backend
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:3000,http://localhost:5173
      - DATA_DIR=/data
      - UPLOAD_DIR=/data/uploads
      - REPORT_DIR=/data/reports
    volumes:
      - drone-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: drone-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  drone-data:
