[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

# FastAPI uses Depends()/File() in parameter defaults by design; treat as immutable for B008.
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.File"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
