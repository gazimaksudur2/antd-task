# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect repo → apply this file.
#
# Notes:
# - Standard Web Services on Render are CPU-only. Use YOLO_DEVICE=cpu (or auto).
# - Free tier has little RAM; YOLO + PyTorch usually needs Starter or higher.
# - Add a persistent disk in the dashboard if you need uploads to survive redeploys.

services:
  - type: web
    name: smart-drone-analyzer-api
    runtime: python
    region: oregon # change: frankfurt | singapore | etc.
    plan: starter # free tier often OOMs on ultralytics; use starter+ for real use
    rootDir: backend
    buildCommand: bash scripts/render_build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: YOLO_DEVICE
        value: cpu
      - key: YOLO_HALF
        value: "false"
      - key: FRAME_SKIP
        value: "2"
      - key: CORS_ORIGINS
        sync: false # set in dashboard to your frontend URL(s), comma-separated
      - key: HOST
        value: 0.0.0.0
      # Paths stay default under ./data — mount a disk in dashboard and override if needed:
      # DATA_DIR, UPLOAD_DIR, REPORT_DIR
